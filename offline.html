<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fit Match - Sin conexion</title>
<meta name="theme-color" content="#7c5cff">
<link rel="icon" href="favicon-32.png" type="image/png">
<style>
  html,body{height:100%;margin:0}
  body{
    font-family:'Space Grotesk','Inter',system-ui,sans-serif;
    background:#0B0B0F;color:#F3F4F6;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:24px;gap:16px;
  }
  .logo{width:96px;height:96px;border-radius:24px;box-shadow:0 12px 34px rgba(124,92,255,.4)}
  h1{font-size:26px;margin:0;background:linear-gradient(90deg,#7c5cff,#22d3ee);-webkit-background-clip:text;background-clip:text;color:transparent}
  p{color:#8b92b0;max-width:340px;line-height:1.5;margin:0}
  button{
    margin-top:8px;background:linear-gradient(135deg,#7c5cff,#22d3ee);color:#fff;border:none;
    border-radius:12px;padding:12px 22px;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit
  }
</style>
</head>
<body>
  <img src="icon-192.png" alt="Fit Match" class="logo">
  <h1>Sin conexion</h1>
  <p>Parece que no tienes internet ahora mismo. Revisa tu conexion y vuelve a intentarlo. Tus entrenos te esperan.</p>
  <button onclick="location.reload()"><i></i>Reintentar</button>
</body>
</html>
